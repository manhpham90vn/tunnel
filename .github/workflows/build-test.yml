name: Build Test

on:
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: 'Enable debugging (ssh access)'
        required: false
        default: false
        type: boolean
  push:
    branches: [develop]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ============================================
  # Build Client for all platforms
  # ============================================
  build-client:
    name: Build Client (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: ubuntu-latest
          - platform: windows-latest

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node Client
        uses: ./.github/actions/setup-node-client
        with:
          install-deps: ${{ matrix.platform == 'ubuntu-latest' }}

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          workspaces: client/src-tauri
          targets: ${{ matrix.rust-targets }}

      - name: Build Tauri app (macOS universal)
        if: matrix.platform == 'macos-latest'
        working-directory: client
        run: npx tauri build --target universal-apple-darwin

      - name: Build Tauri app
        if: matrix.platform != 'macos-latest'
        working-directory: client
        run: npx tauri build

      - name: Upload macOS artifacts
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: build-test-macos
          path: |
            client/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn
          retention-days: 3

      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: build-test-linux
          path: |
            client/src-tauri/target/release/bundle/deb/*.deb
            client/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn
          retention-days: 3

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: build-test-windows
          path: |
            client/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 3

      - name: Setup debugging (if enabled)
        if: inputs.debug_enabled && failure()
        uses: mxschmitt/action-tmate@v3

  # ============================================
  # Build Server .deb package
  # ============================================
  build-server:
    name: Build Server Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          workspaces: |
            server
            tunnel-protocol

      - name: Cache cargo-deb
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-deb
          key: ${{ runner.os }}-cargo-deb

      - name: Install cargo-deb
        shell: bash
        run: |
          if ! command -v cargo-deb &> /dev/null; then
            cargo install cargo-deb --locked
          fi

      - name: Build .deb package
        working-directory: server
        run: cargo deb

      - name: Upload server .deb
        uses: actions/upload-artifact@v4
        with:
          name: build-test-server
          path: server/target/debian/*.deb
          if-no-files-found: error
          retention-days: 3

      - name: Setup debugging (if enabled)
        if: inputs.debug_enabled && failure()
        uses: mxschmitt/action-tmate@v3

  # ============================================
  # Summary
  # ============================================
  build-summary:
    name: Build Summary
    needs: [build-client, build-server]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Report build status
        run: |
          echo "## Build Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build Client (macos-latest) | ${{ needs.build-client.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Client (ubuntu-latest) | ${{ needs.build-client.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Client (windows-latest) | ${{ needs.build-client.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Server Package | ${{ needs.build-server.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
