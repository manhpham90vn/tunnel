name: Check

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ============================================
  # Server Jobs
  # ============================================
  lint-server:
    name: Lint Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          workspaces: |
            server
            tunnel-protocol

      - name: Check formatting (server)
        working-directory: server
        run: cargo fmt --check

      - name: Run clippy (server)
        working-directory: server
        run: cargo clippy -- -D warnings

      - name: Check formatting (protocol)
        working-directory: tunnel-protocol
        run: cargo fmt --check

      - name: Run clippy (protocol)
        working-directory: tunnel-protocol
        run: cargo clippy -- -D warnings

      - name: Check compilation
        working-directory: server
        run: cargo check

  test-server:
    name: Test Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          workspaces: |
            server
            tunnel-protocol

      - name: Run tests (protocol)
        working-directory: tunnel-protocol
        run: cargo test --all-features

      - name: Run tests (server)
        working-directory: server
        run: cargo test --all-features

  audit-server:
    name: Security Audit (Rust)
    runs-on: ubuntu-latest
    needs: [lint-server]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          workspaces: |
            server
            tunnel-protocol
            client/src-tauri

      - name: Cache cargo-audit
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: ${{ runner.os }}-cargo-audit

      - name: Install cargo-audit
        shell: bash
        run: |
          if ! command -v cargo-audit &> /dev/null; then
            cargo install cargo-audit --locked
          fi

      - name: Run cargo audit (server)
        working-directory: server
        run: cargo audit || true

      - name: Run cargo audit (protocol)
        working-directory: tunnel-protocol
        run: cargo audit || true

      - name: Run cargo audit (client)
        working-directory: client/src-tauri
        run: cargo audit || true

  # ============================================
  # Client Jobs
  # ============================================
  lint-client:
    name: Lint Client
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node Client
        uses: ./.github/actions/setup-node-client
        with:
          install-deps: true

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          workspaces: client/src-tauri

      - name: Check formatting
        working-directory: client/src-tauri
        run: cargo fmt --check

      - name: Run clippy
        working-directory: client/src-tauri
        run: cargo clippy -- -D warnings

      - name: Build frontend
        working-directory: client
        run: npm run build

  test-client:
    name: Test Client
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node Client
        uses: ./.github/actions/setup-node-client
        with:
          install-deps: true

      - name: Run npm audit
        working-directory: client
        run: npm audit || true

      - name: Run tests (if available)
        working-directory: client
        run: npm test --if-present || echo "No tests configured"
