name: Setup Rust

description: Setup Rust toolchain with caching for the project

inputs:
  workspaces:
    description: 'Comma-separated list of Rust workspaces to cache'
    required: true
  components:
    description: 'Additional Rust components to install (comma-separated)'
    required: false
    default: 'rustfmt,clippy'
  targets:
    description: 'Rust targets to install (comma-separated)'
    required: false
    default: ''

runs:
  using: composite

  steps:
    - name: Install Rust stable
      uses: dtolnay/rust-toolchain@stable
      with:
        components: ${{ inputs.components }}
        targets: ${{ inputs.targets }}

    - name: Configure Rust cache
      uses: swatinem/rust-cache@v2
      with:
        workspaces: ${{ inputs.workspaces }}
